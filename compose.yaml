services:
  fridgeboard:
    build: .
    container_name: fridgeboard-app
    restart: unless-stopped
    environment:
      FRIDGEBOARD_DATABASE_URL: ${FRIDGEBOARD_DATABASE_URL:-sqlite:////data/fridgeboard.db}
      FRIDGEBOARD_PUBLIC_BASE_URL: ${FRIDGEBOARD_PUBLIC_BASE_URL}
      FRIDGEBOARD_FLYCN_AUTHORIZE_URL: ${FRIDGEBOARD_FLYCN_AUTHORIZE_URL}
      FRIDGEBOARD_FLYCN_EXCHANGE_URL: ${FRIDGEBOARD_FLYCN_EXCHANGE_URL}
      FRIDGEBOARD_FLYCN_CLIENT_SECRET: ${FRIDGEBOARD_FLYCN_CLIENT_SECRET}
      FRIDGEBOARD_LOCAL_OWNER_USER_ID: ${FRIDGEBOARD_LOCAL_OWNER_USER_ID:-}
      FRIDGEBOARD_AGNES_RECOGNITION_URL: ${FRIDGEBOARD_AGNES_RECOGNITION_URL:-https://apihub.agnes-ai.com/v1/chat/completions}
      FRIDGEBOARD_AGNES_API_TOKEN: ${FRIDGEBOARD_AGNES_API_TOKEN:-}
      FRIDGEBOARD_AGNES_MODEL: ${FRIDGEBOARD_AGNES_MODEL:-agnes-2.0-flash}
    volumes:
      - fridgeboard-data:/data
    networks:
      - proxy
    mem_limit: 384m
    cpus: 0.75

volumes:
  fridgeboard-data:

networks:
  proxy:
    external: true
