<!DOCTYPE html><html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    
    :root {
      --bg-warm: #fdfcf9;
      --ink-black: #1a1a1a;
      --ink-muted: #666666;
      --hatch-color: rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: 'Noto+Sans+SC', sans-serif;
      background-color: var(--bg-warm);
      color: var(--ink-black);
      -webkit-font-smoothing: antialiased;
    }

    .hatch-bg {
      background-image: repeating-linear-gradient(
        45deg,
        var(--hatch-color),
        var(--hatch-color) 1px,
        transparent 1px,
        transparent 8px
      );
    }

    .line-art-phone {
      width: 120px;
      height: 180px;
      border: 1.5px solid var(--ink-black);
      border-radius: 12px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .line-art-fridge {
      width: 100px;
      height: 160px;
      border: 1.5px solid var(--ink-black);
      border-radius: 4px;
      position: relative;
    }

    .fridge-door {
      position: absolute;
      left: 0;
      top: 0;
      width: 80%;
      height: 100%;
      border-right: 1.5px solid var(--ink-black);
      background: var(--bg-warm);
      z-index: 10;
    }

    .fridge-shelf {
      position: absolute;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--ink-black);
    }
  </style>
</head>
<body>
  <div class="flex flex-col min-h-screen bg-[#fdfcf9] overflow-hidden" data-sd-id="1">
    <!-- Header -->
    <header class="flex items-center justify-between px-6 pt-12 pb-6" data-sd-id="2">
      <div class="flex flex-col" data-sd-id="3">
        <span class="text-xl font-medium tracking-tight" style="view-transition-name: brand-title" data-sd-id="4">家常食橱</span>
        <span class="text-[10px] uppercase tracking-widest text-[#666] mt-0.5" data-sd-id="5">Android</span>
      </div>
      <a href="#" id="close-guide-btn" class="p-1" data-sd-id="6">
        <iconify-icon icon="lucide:x" class="text-2xl text-[#1a1a1a]"></iconify-icon>
      </a>
    </header>

    <!-- Main Visual -->
    <main class="flex-1 px-8" data-sd-id="7">
      <div class="flex justify-center items-end space-x-4 py-8" data-sd-id="8">
        <!-- Phone Pictogram -->
        <div class="line-art-phone" data-sd-id="9">
          <div class="hatch-bg absolute inset-2 rounded-lg opacity-40" data-sd-id="10"></div>
          <iconify-icon icon="lucide:smartphone" class="text-3xl z-10"></iconify-icon>
        </div>
        
        <div class="pb-12 text-[#1a1a1a]" data-sd-id="11">
          <iconify-icon icon="lucide:arrow-right" class="text-xl"></iconify-icon>
        </div>

        <!-- Open Fridge Pictogram -->
        <div class="line-art-fridge" data-sd-id="12">
          <div class="fridge-door" data-sd-id="13"></div>
          <div class="fridge-shelf top-[25%]" data-sd-id="14"></div>
          <div class="fridge-shelf top-[50%]" data-sd-id="15"></div>
          <div class="fridge-shelf top-[75%]" data-sd-id="16"></div>
          <div class="absolute right-2 top-[40%] flex flex-col space-y-2 opacity-60" data-sd-id="17">
            <div class="w-4 h-4 rounded-full border border-black" data-sd-id="18"></div>
            <div class="w-3 h-5 border border-black" data-sd-id="19"></div>
          </div>
        </div>
      </div>

      <!-- Text Content -->
      <div class="text-center mt-6 space-y-4" data-sd-id="20">
        <h1 class="text-2xl font-medium tracking-tight" data-sd-id="21">先装到手机</h1>
        <p class="text-sm text-[#666] leading-relaxed" data-sd-id="22">
          安装后，在应用内再扫一次冰箱上的二维码即可连接。
        </p>
        
        <div class="inline-flex items-center px-3 py-1 bg-white border border-[#eee] rounded-full" data-sd-id="23">
          <div class="w-2 h-2 rounded-full bg-green-500 mr-2" data-sd-id="24"></div>
          <span class="text-[11px] text-[#888]" data-sd-id="25">已识别冰箱：家常食橱</span>
        </div>
      </div>

      <!-- Android Guide Steps -->
      <div class="mt-12 max-w-[280px] mx-auto" data-sd-id="26">
        <div class="flex items-center justify-between border-b border-[#eee] pb-6" data-sd-id="27">
          <div class="flex flex-col items-center" data-sd-id="28">
            <div class="w-10 h-10 flex items-center justify-center border border-[#1a1a1a] rounded-lg mb-2" data-sd-id="29">
              <iconify-icon icon="lucide:more-vertical" class="text-xl"></iconify-icon>
            </div>
            <span class="text-[11px] font-medium" data-sd-id="30">浏览器菜单</span>
          </div>
          
          <div class="text-[#ccc]" data-sd-id="31">
            <iconify-icon icon="lucide:chevron-right"></iconify-icon>
          </div>

          <div class="flex flex-col items-center" data-sd-id="32">
            <div class="w-10 h-10 flex items-center justify-center border border-[#1a1a1a] rounded-lg mb-2" data-sd-id="33">
              <iconify-icon icon="lucide:download-cloud" class="text-xl"></iconify-icon>
            </div>
            <span class="text-[11px] font-medium" data-sd-id="34">安装应用</span>
          </div>

          <div class="text-[#ccc]" data-sd-id="35">
            <iconify-icon icon="lucide:chevron-right"></iconify-icon>
          </div>

          <div class="flex flex-col items-center" data-sd-id="36">
            <div class="w-10 h-10 flex items-center justify-center bg-[#1a1a1a] text-white rounded-lg mb-2" data-sd-id="37">
              <iconify-icon icon="lucide:check" class="text-xl"></iconify-icon>
            </div>
            <span class="text-[11px] font-medium" data-sd-id="38">完成安装</span>
          </div>
        </div>
      </div>

      <!-- Empty Space -->
      <div class="h-24" data-sd-id="39"></div>
    </main>
  </div>

</body></html>
