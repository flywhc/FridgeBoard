<!DOCTYPE html><html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto+Sans+SC', sans-serif;
            background-color: #FDFCF9;
            color: #1A1A1A;
            -webkit-font-smoothing: antialiased;
        }
        .paper-bg {
            background-color: #FDFCF9;
        }
        .ink-border {
            border-color: #1A1A1A;
        }
        .hatched-mark {
            background-image: repeating-linear-gradient(45deg, #1A1A1A, #1A1A1A 1px, transparent 1px, transparent 5px);
        }
        input:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex flex-col paper-bg max-w-[390px] mx-auto overflow-hidden relative" data-sd-id="1">
        <!-- Header -->
        <header class="flex items-center justify-between px-6 pt-12 pb-6 sticky top-0 bg-[#FDFCF9] z-40" data-sd-id="2">
            <a href="#" id="nav-back-link" class="flex items-center" data-sd-id="3">
                <iconify-icon icon="lucide:arrow-left" class="text-2xl"></iconify-icon>
            </a>
            <h1 class="text-lg font-bold tracking-tight" data-sd-id="4">周二食谱</h1>
            <a href="#" id="nav-save-link" class="text-base font-medium opacity-80" data-sd-id="5">保存</a>
        </header>

        <!-- Main Content -->
        <main class="flex-1 px-6 pb-24 overflow-y-auto" data-sd-id="6">
            <!-- Title Field -->
            <div class="mt-4 flex items-center border-b-2 ink-border pb-2 group" data-sd-id="7">
                <iconify-icon icon="lucide:soup" class="text-3xl mr-3 opacity-90"></iconify-icon>
                <input type="text" value="鸡蛋炒河粉" class="bg-transparent text-2xl font-bold w-full placeholder:text-gray-300" placeholder="输入料理名称" data-sd-id="8">
            </div>

            <!-- Ingredients List -->
            <section class="mt-10" data-sd-id="9">
                <div class="flex justify-between items-end mb-4" data-sd-id="10">
                    <h2 class="text-sm font-bold tracking-widest uppercase opacity-60" data-sd-id="11">食材</h2>
                </div>

                <div class="space-y-1" data-sd-id="12">
                    <!-- Row 1: Missing Item -->
                    <div class="flex items-center py-4 border-b border-black/5 group" data-sd-id="13">
                        <div class="relative flex items-center justify-center w-10 h-10 border ink-border rounded-sm mr-4" data-sd-id="14">
                            <iconify-icon icon="lucide:egg" class="text-xl"></iconify-icon>
                            <!-- Hatched Status Mark (Inventory Missing) -->
                            <div class="absolute -top-1 -right-1 w-3 h-3 hatched-mark border border-black rounded-full" data-sd-id="15"></div>
                        </div>
                        <input type="text" value="鸡蛋" class="bg-transparent text-base font-medium flex-1" data-sd-id="16">
                        <div class="flex items-center" data-sd-id="17">
                            <span class="text-xs text-black/40 mr-1" data-sd-id="18">×</span>
                            <input type="text" value="4" class="bg-transparent text-base font-medium w-8 text-right mr-3" data-sd-id="19">
                            <button class="opacity-20 hover:opacity-100 transition-opacity" data-sd-id="20">
                                <iconify-icon icon="lucide:x" class="text-lg"></iconify-icon>
                            </button>
                        </div>
                    </div>

                    <!-- Row 2 -->
                    <div class="flex items-center py-4 border-b border-black/5 group" data-sd-id="21">
                        <div class="flex items-center justify-center w-10 h-10 border ink-border rounded-sm mr-4" data-sd-id="22">
                            <iconify-icon icon="lucide:drumstick" class="text-xl"></iconify-icon>
                        </div>
                        <input type="text" value="火腿" class="bg-transparent text-base font-medium flex-1" data-sd-id="23">
                        <div class="flex items-center" data-sd-id="24">
                            <input type="text" placeholder="数量" class="bg-transparent text-base font-medium w-12 text-right mr-3" data-sd-id="25">
                            <button class="opacity-20 hover:opacity-100 transition-opacity" data-sd-id="26">
                                <iconify-icon icon="lucide:x" class="text-lg"></iconify-icon>
                            </button>
                        </div>
                    </div>

                    <!-- Row 3 -->
                    <div class="flex items-center py-4 border-b border-black/5 group" data-sd-id="27">
                        <div class="flex items-center justify-center w-10 h-10 border ink-border rounded-sm mr-4" data-sd-id="28">
                            <iconify-icon icon="lucide:wheat" class="text-xl"></iconify-icon>
                        </div>
                        <input type="text" value="河粉" class="bg-transparent text-base font-medium flex-1" data-sd-id="29">
                        <div class="flex items-center" data-sd-id="30">
                            <input type="text" placeholder="数量" class="bg-transparent text-base font-medium w-12 text-right mr-3" data-sd-id="31">
                            <button class="opacity-20 hover:opacity-100 transition-opacity" data-sd-id="32">
                                <iconify-icon icon="lucide:x" class="text-lg"></iconify-icon>
                            </button>
                        </div>
                    </div>

                    <!-- Add Row -->
                    <button class="w-full flex items-center py-4 border-b border-black/5 border-dashed" data-sd-id="33">
                        <div class="flex items-center justify-center w-10 h-10 border border-dashed border-black/20 rounded-sm mr-4" data-sd-id="34">
                            <iconify-icon icon="lucide:plus" class="text-xl opacity-30"></iconify-icon>
                        </div>
                        <span class="text-black/30 font-medium" data-sd-id="35">添加食材</span>
                    </button>
                </div>

                <!-- Note -->
                <div class="mt-8 flex items-start gap-2 p-4 bg-black/[0.03] rounded-sm" data-sd-id="36">
                    <iconify-icon icon="lucide:target" class="text-sm mt-0.5 opacity-60"></iconify-icon>
                    <p class="text-[11px] leading-relaxed opacity-50" data-sd-id="37">
                        仅按小类名称完全匹配；未匹配时可修改名称
                    </p>
                </div>
            </section>
        </main>

        <!-- Bottom Action -->
        <div class="fixed bottom-0 left-0 right-0 max-w-[390px] mx-auto p-6 bg-[#FDFCF9] z-50" data-sd-id="38">
            <button id="cta-save-btn" class="w-full py-4 bg-[#1A1A1A] text-[#FDFCF9] font-bold text-base flex items-center justify-center gap-2 hover:bg-black transition-colors" data-sd-id="39">
                保存食谱
            </button>
        </div>
    </div>

</body></html>
