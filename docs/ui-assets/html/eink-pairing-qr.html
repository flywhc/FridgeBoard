<!DOCTYPE html><html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        body {
            font-family: 'Noto+Sans+SC', sans-serif;
            background-color: #000;
            margin: 0;
            padding: 0;
        }
        .e-ink-border {
            border: 4px solid #000;
        }
        .qr-border {
            border: 1px solid #000;
        }
        .pixel-text {
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body>
    <div class="w-[540px] h-[720px] bg-white text-black flex flex-col p-6" data-sd-id="1">
        <div class="flex-1 flex flex-col e-ink-border overflow-hidden" data-sd-id="2">
            <!-- Header: 3-Column Row -->
            <header class="flex items-center justify-between px-6 pt-10 pb-6 border-b-2 border-black" data-sd-id="3">
                <a href="#" id="back-link" class="flex items-center justify-center w-12 h-12" data-sd-id="4">
                    <iconify-icon icon="lucide:arrow-left" class="text-4xl"></iconify-icon>
                </a>
                
                <div class="text-center flex-1" data-sd-id="5">
                    <h1 class="text-2xl font-bold tracking-tight" data-sd-id="6">连接手机</h1>
                    <p class="text-sm mt-1" data-sd-id="7">扫描二维码，在手机上管理食材</p>
                </div>

                <a href="#" id="refresh-qr-link" class="flex items-center justify-center w-12 h-12" data-sd-id="8">
                    <iconify-icon icon="lucide:refresh-cw" class="text-3xl"></iconify-icon>
                </a>
            </header>

            <!-- Main QR Content -->
            <main class="flex-1 flex flex-col items-center justify-center px-10" data-sd-id="9">
                <div class="p-6 qr-border bg-white" data-sd-id="10">
                    <!-- Placeholder for a high-contrast QR code -->
                    <div class="w-64 h-64 bg-black flex items-center justify-center" data-sd-id="11">
                        <div class="w-full h-full p-2 bg-white" data-sd-id="12">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=256x256&amp;data=home-pantry-pwa&amp;color=000&amp;bgcolor=fff" alt="QR Code" class="w-full h-full grayscale" data-sd-id="13">
                        </div>
                    </div>
                </div>

                <!-- Timer Info -->
                <div class="mt-10 flex flex-col items-center gap-2" data-sd-id="14">
                    <div class="flex items-center gap-2 text-lg font-bold" data-sd-id="15">
                        <iconify-icon icon="lucide:clock" class="text-xl"></iconify-icon>
                        <span data-sd-id="16">本次连接有效 09:52</span>
                    </div>
                    <div class="text-base border-t border-black pt-2 mt-2" data-sd-id="17">
                        安装 PWA 后请再扫一次
                    </div>
                </div>
            </main>

            <!-- Footer -->
            <footer class="p-8 flex justify-center border-t border-black" data-sd-id="18">
                <div class="flex items-center gap-3 opacity-60" data-sd-id="19">
                    <iconify-icon icon="lucide:home" class="text-2xl"></iconify-icon>
                    <span class="text-sm" data-sd-id="20">10分钟后回到首页</span>
                </div>
            </footer>
        </div>
    </div>

</body></html>
